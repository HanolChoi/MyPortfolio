<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>행스터즈 캡슐머신 EVENT! - 당첨 내역</title>
</head>
<body>
    <div id="wrap">
        <!-- 제목 START -->
        <section class="headline">
            <h1 class="headline__title"><span class="headline__emphasis">행스터즈</span> 캡슐머신<br>당첨 내역</h1>
        </section>
        <!-- 제목 END -->
        <!-- 캡슐머신 당첨 내역 START -->
        <section class="event">
            <h2 class="hidden-text">캡슐머신 당첨 내역</h2>

            <div class="event__quantity"></div>
            <div class="event__winningdetails">
                <p class="title">캡슐머신 당첨 내역</p>

                <ul class="winningdetails__list">
                    <li class="winningdetails__item">
                        <img class="winningdetails__image" src="images/008.png" alt="행스터즈 NFT 이미지">
                        <span class="winningdetails__title">행스터즈 NFT</span>
                        <button class="button button-disabled" type="button">지급 완료</button>
                    </li>
                    <li class="winningdetails__item">
                        <img class="winningdetails__image" src="images/eth.png" alt="500 XEED 이미지">
                        <span class="winningdetails__title">500 XEED</span>
                        <button class="button button-disabled" type="button">지급 완료</button>
                    </li>
                    <li class="winningdetails__item">
                        <img class="winningdetails__image" src="images/010.png" alt="이더리움 이미지">
                        <span class="winningdetails__title">이더리움</span>
                        <button class="button button-disabled" type="button">지급 완료</button>
                    </li>
                    <li class="winningdetails__item">
                        <img class="winningdetails__image" src="images/009.png" alt="쳇바퀴 NFT 이미지">
                        <span class="winningdetails__title">쳇바퀴 NFT</span>
                        <button class="button button-get" type="button">지급 받기</button>
                    </li>
                    <li class="winningdetails__item">
                        <img class="winningdetails__image" src="images/006.png" alt="갱스터 NFT 이미지">
                        <span class="winningdetails__title">갱스터 NFT</span>
                        <button class="button button-get" type="button">지급 받기</button>
                    </li>
                </ul>
            </div>
        </section>
        <!-- 캡슐머신 당첨 내역 END -->
    </div>
</body>
</html>
